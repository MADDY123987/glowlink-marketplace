services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: glowlink
      POSTGRES_PASSWORD: glowlink123
      POSTGRES_DB: glowlink_db
    ports:
      - "5456:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowlink -d glowlink_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass glowlinkRedis123 --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: